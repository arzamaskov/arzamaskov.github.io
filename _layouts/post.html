---
layout: default
---

<main class="flex-shrink-0 py-lg-5">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 mx-auto">
        <article>
          <header>
            <h1>{{ page.title }}</h1>
            <p class="font-weight-light small"></p>
          </header>
          <div>
            {{ content }}
          </div>
          <div class="mt-5">
            {% if page.previous.url %}
              <small>←&nbsp;<a href="{{ page.previous.url }}">{{ page.previous.title }}</a></small>
            {% endif %}
            {% if page.previous.url and page.next.url %}
              <small class="mx-3">/</small>
            {% endif %}
            {% if page.next.url %}
              <small><a class="next" href="{{ page.next.url }}">{{ page.next.title }}</a>&nbsp;→</small>
            {% endif %}
          </div>
        </article>
      </div>
    </div>
  </div>
</main>
